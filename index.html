<!DOCTYPE html>
<html>
  <head>
    <title>Flexbox Pricing Table</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Playwrite+AU+TAS:wght@100..400&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Allura&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Orbitron:wght@400..900&family=Playwrite+AU+TAS:wght@100..400&display=swap" rel="stylesheet">


    <style>
      body {
        font-family: "Sono", sans-serif;
      }
      .plan-title{
        font-size: 2rem;
        font-weight: bold;
      }
      .plan-price{
        font-size:3rem;
        font-weight: 1000;
      }
      .plan-features{
        font-size: 0.75rem;
      }

      /* providing some uniqueness to each subscription*/
      .font-standard{
         font-family: "Merriweather", serif;
      }
      .font-premium{
        font-family: "Playwrite AU TAS", cursive;
      }

      .basic{
         background-color: #FFD196;
      }
      .standard{
          background-color: #FFBB5E;
      }
      .premium{
        background-color: #FFA629; 
      }
      
      /*back to the code again*/
      .pricing-plan{
        width: 400px;
        height: 350px;
        padding: 10px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 20px;
        border-radius: 10%;
      }
      .pricing-container > * {
        text-align: center;
      }
      .plan-button{
        padding: 7px;
        font-size: 1rem;
        background-color: #ff6600;
        color: white;
        border-radius: 10%;
        border: none;
      }
      .plan-features {
        list-style: none;
      }
      .plan-features li{

        margin-bottom: 5px;
        display: flex;
        font-size: 15px;
        font-weight: 800;
      }
      .pricing-container{
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 20px;
        height: 35vh;
      }
      h1{
        font-size: 6rem;
        text-align: center;
        font-family: "Allura", cursive;
      }
      
      @media(max-width: 1250px){
          .pricing-container{
            flex-direction: column;
            height: 100%;
          }
          h1{
            flex-direction: column;
            justify-content: center;
          }
      }

      /* Hint: What can you do with a media query and flexbox? */
    </style>
  </head>

  <body>
    <h1>Subscriptions</h1>
    <div class="pricing-container">
      <div class="pricing-plan basic">
        <div class="plan-title font-basic">Basic</div>
        <div class="plan-price">$9.99/month</div>
        <ul class="plan-features">
          <li>✅ 10GB Storage</li>
          <li>✅ 1 User</li>
          <li>🚫 Support</li>
        </ul>
        <button class="plan-button">Sign Up</button>
      </div>
      <div class="pricing-plan standard">
        <div class="plan-title font-standard">Standard</div>
        <div class="plan-price">$19.99/month</div>
        <ul class="plan-features">
          <li>✅ 50GB Storage</li>
          <li>✅ 5 Users</li>
          <li>✅ Phone &amp; Email Support</li>
        </ul>
        <button class="plan-button">Sign Up</button>
      </div>
      <div class="pricing-plan premium">
        <div class="plan-title font-premium">Premium</div>
        <div class="plan-price">$49.99/month</div>
        <ul class="plan-features">
          <li>✅ 100GB Storage</li>
          <li>✅ 10 Users</li>
          <li>✅ 24/7 Support</li>
        </ul>
        <button class="plan-button">Sign Up</button>
      </div>
    </div>
  </body>
</html>
